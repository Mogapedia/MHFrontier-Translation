name: Release translations

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all CSVs
        run: python scripts/validate.py translations/

      - name: Export JSON (all strings)
        run: python scripts/export_json.py --out translations.json

      - name: Export JSON (translated only)
        run: python scripts/export_json.py --out translations-translated.json --only-translated

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: translations
          path: |
            translations.json
            translations-translated.json

      - name: Create rolling release (main pushes)
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest translations
          body: |
            Auto-generated translation files, updated on every push to `main`.

            - `translations.json` — all strings (source + target, 42 MB)
            - `translations-translated.json` — translated strings only (small)

            These files contain **only translated text** — no original game data.

            ### Apply with mhf-outpost + FrontierTextHandler

            ```bash
            # 1. Download the JSON into your game directory
            mhf-outpost translate --path ~/mhf --lang fr

            # 2. Apply to your game files (requires FrontierTextHandler ≥ 1.5.0)
            cd FrontierTextHandler
            python main.py ~/mhf/translations-translated.json \
              --apply-translations --lang fr --game-dir ~/mhf \
              --compress --encrypt
            ```

            Or use `scripts/build_bins.py` locally for a full rebuild from CSVs.
          files: |
            translations.json
            translations-translated.json
          make_latest: true

      - name: Create tagged release (v* tags)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Immutable tagged release built from `${{ github.sha }}`.

            - `translations.json` — all strings (source + target)
            - `translations-translated.json` — translated strings only

            Requires [FrontierTextHandler](https://github.com/Houmgaor/FrontierTextHandler) ≥ 1.5.0 (index-keyed CSV format).
          files: |
            translations.json
            translations-translated.json
          make_latest: false
